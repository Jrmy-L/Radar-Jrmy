name: Collect metrics

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run collection
        env:
          GITHUB_TOKEN: ${{ secrets.RADAR_GITHUB_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/collect.py

      - name: Commit updated data.json
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@noreply.github.com"
          git add data/data.json
          git diff --staged --quiet || git commit -m "chore: update metrics [skip ci]"
          git push
