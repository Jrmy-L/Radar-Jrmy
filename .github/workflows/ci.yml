name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONPATH: ${{ github.workspace }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint Python (ruff)
        run: ruff check scripts/ tests/

      - name: Lint Python format (ruff)
        run: ruff format --check scripts/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Validate technologies.yaml schema
        run: python scripts/validate_yaml.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dev tools
        run: npm install --save-dev eslint htmlhint

      - name: Lint HTML
        run: npx htmlhint "src/**/*.html"

      - name: Lint JS
        run: npx eslint src/js/
